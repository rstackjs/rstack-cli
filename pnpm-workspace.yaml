packages:
  - packages/*
  - examples/*
  - website

allowBuilds:
  core-js: false
  simple-git-hooks: false

catalogMode: prefer

cleanupUnusedCatalogs: true

catalog:
  '@rsbuild/core': '~2.1.6'
  '@rsbuild/plugin-react': '^2.1.0'
  '@rsbuild/plugin-sass': '^2.0.1'
  '@rslib/core': '~1.0.0-beta.0'
  '@rslint/core': '~0.7.0'
  '@rspress/core': '^2.0.17'
  '@rspress/plugin-sitemap': '^2.0.17'
  '@rstack-dev/doc-ui': '1.14.5'
  '@rstackjs/load-config': ^0.1.2
  '@rstackjs/test-utils': ^0.2.0
  '@rstest/adapter-rsbuild': '~0.11.1'
  '@rstest/adapter-rslib': '~0.11.1'
  '@rstest/core': '~0.11.1'
  '@testing-library/dom': '^10.4.1'
  '@testing-library/jest-dom': '^6.9.1'
  '@testing-library/react': '^16.3.2'
  '@types/node': '^24.13.3'
  '@types/react': '^19.2.17'
  '@types/react-dom': '^19.2.3'
  '@shikijs/transformers': '^4.3.1'
  'cspell-ban-words': '^0.0.4'
  'happy-dom': '^20.10.6'
  husky: ^9.1.7
  'lint-staged': '^17.0.8'
  'oxfmt': '^0.59.0'
  'react': '^19.2.7'
  'react-dom': '^19.2.7'
  'rsbuild-plugin-open-graph': '^1.1.3'
  rslog: ^2.2.0
  'rspress-plugin-font-open-sans': '^1.0.4'
  'typescript': '^7.0.2'

dedupePeers: true

autoInstallPeers: false

engineStrict: true

hoistPattern: []

# Reduce the risk of installing compromised packages
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@rspack/*'
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rspress/*'
  - '@rstest/*'
  - '@rslint/*'
  - '@rstackjs/*'
  - 'rslog'
  - '@rstack-dev/doc-ui'
  - 'rsbuild-plugin-*'
  - '@swc/*'
  - 'heading-case'
